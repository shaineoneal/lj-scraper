name: Build Executables

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
      - 'v*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: lj-scraper-linux
            binary_name: lj-scraper-linux
          - os: windows-latest
            artifact_name: lj-scraper-windows
            binary_name: lj-scraper-windows.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .

      - name: Compile with PyInstaller
        run: |
          pyinstaller lj_scraper.spec

      - name: Rename compiled binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/lj_scraper.exe dist/${{ matrix.binary_name }}
          else
            mv dist/lj_scraper dist/${{ matrix.binary_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.binary_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: lj-scraper-linux
          path: ./dist-release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: lj-scraper-windows
          path: ./dist-release

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist-release/lj-scraper-linux
            ./dist-release/lj-scraper-windows.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
